<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" fill="none">
  <!-- Coffee bean icon with light ray -->
  <g transform="translate(8, 8)">
    <!-- Bean shape -->
    <ellipse cx="28" cy="32" rx="22" ry="28" fill="#1A120B" />
    <!-- Bean center crease -->
    <path d="M28 8 C24 18, 24 28, 28 38 C32 48, 32 52, 28 56" stroke="#FAFAF7" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Geometric light ray cutting through bean -->
    <line x1="10" y1="16" x2="46" y2="48" stroke="#E85D04" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
    <!-- Light sparkle at intersection -->
    <circle cx="28" cy="32" r="3" fill="#E85D04" opacity="0.8"/>
    <!-- Subtle glow -->
    <circle cx="28" cy="32" r="6" fill="#E85D04" opacity="0.15"/>
  </g>
  <!-- Wordmark -->
  <text x="72" y="32" font-family="'Playfair Display', Georgia, serif" font-size="16" font-weight="600" letter-spacing="3.5" fill="#1A120B">CAFES</text>
  <text x="72" y="62" font-family="'Playfair Display', Georgia, serif" font-size="34" font-weight="600" fill="#1A120B">LUMIER<tspan fill="#E85D04">E</tspan></text>
</svg>
