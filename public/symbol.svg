<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <!-- Coffee bean -->
  <ellipse cx="40" cy="40" rx="18" ry="26" fill="#1A120B"/>
  <!-- Bean center crease -->
  <path d="M40 18 C36 28, 36 36, 40 44 C44 52, 44 56, 40 62" stroke="#FAFAF7" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Geometric light ray -->
  <line x1="22" y1="22" x2="58" y2="58" stroke="#E85D04" stroke-width="3.5" stroke-linecap="round" opacity="0.9"/>
  <!-- Light sparkle -->
  <circle cx="40" cy="40" r="4" fill="#E85D04" opacity="0.8"/>
  <circle cx="40" cy="40" r="8" fill="#E85D04" opacity="0.12"/>
  <!-- Subtle light rays (2 accent lines) -->
  <line x1="40" y1="4" x2="40" y2="10" stroke="#E85D04" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="66" y1="40" x2="72" y2="40" stroke="#E85D04" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
</svg>
